spring.application.name=StudentLifeAPIs

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=5000

#spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jwt-secret=${SPRING_JWT_SECRET}
spring.access-token-expire=${SPRING_ACCESS_TOKEN_EXPIRE}
#spring.refresh-token-expire=${SPRING_REFRESH_TOKEN_EXPIRE}

#app.secure-cookie=false
#app.secure-cookie=true
#server.forward-headers-strategy=FRAMEWORK

# Multipart file upload settings
