cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${API_KEY}
cloudinary.api-secret=${API_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#app.frontend.url=http://localhost:3000
app.frontend.url=https://student-life-platform.vercel.app
#app.frontend.url=https://communicate-princeton-shot-highest.trycloudflare.com
#app.backend.url=https://could-reid-coordinate-marco.trycloudflare.com
app.backend.url=https://studentlifeapis-1.onrender.com

# WebSocket is auto-configured, but good to define your broker settings
spring.websocket.path=/ws

#admin credential
spring.admin.username=${SPRING_ADMIN_USERNAME}
spring.admin.email=${SPRING_ADMIN_EMAIL}
spring.admin.password=${SPRING_ADMIN_PASSWORD}

#agent credential
logging.level.org.hibernate=ERROR
logging.level.com.rental=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always

groq.api.key=${SPRING_GROQ_API_KEY}
spring.jackson.serialization.write-dates-as-timestamps=false

# OneSignal
onesignal.app-id=${ONESIGNAL_APP_ID}
onesignal.api-key=${ONESIGNAL_API_KEY}