services:

  db:
    image: postgres:16
    container_name: studentLife_db_prod
    restart: always
    env_file:
    - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          memory: 1g

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentLife_api_prod
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  db_data: